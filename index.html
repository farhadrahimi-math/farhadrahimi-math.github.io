<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

  const supabaseUrl = "https://ypjmkigvghybkwyxndcz.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwam1raWd2Z2h5Ymt3eXhuZGN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTc1NTgsImV4cCI6MjA5OTY5MzU1OH0.lJ5RddKmDdPfLecBsqL9XMGejL9Owbv1ZH2PXSqqdv4";

  const supabase = createClient(supabaseUrl, supabaseKey);

  async function login() {
    const code = document.getElementById("code").value.trim();
    document.getElementById("message").innerText = "در حال بررسی...";

    const { data, error } = await supabase
      .from("Students")
      .select("*")
      .eq("Student_code", code);

    if (error) {
      document.getElementById("message").innerText = "خطا در اتصال ❌";
      console.log(error);
      return;
    }

    if (!data || data.length === 0) {
      document.getElementById("message").innerText = "کد اشتباه است ❌";
      return;
    }

    const student = data[0];

    if (student.Grade == 7) {
      window.location.href = "grade7.html";
    } else if (student.Grade == 8) {
      window.location.href = "grade8.html";
    } else if (student.Grade == 9) {
      window.location.href = "grade9.html";
    }
  }

  window.login = login;
</script>

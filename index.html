<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 باشگاه نخبگان ریاضی</title>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
body{
  margin:0;
  font-family:Tahoma;
  background:#f4f6fb;
}

.hero{
  height:100vh;
  background:linear-gradient(-45deg,#667eea,#764ba2,#2d6a4f,#74c69d);
  background-size:400% 400%;
  animation:gradient 12s ease infinite;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.hero-content{
  max-width:700px;
}

.hero h1{
  font-size:40px;
  margin:0;
}

.hero p{
  font-size:18px;
  margin:20px 0;
}

.cta{
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:white;
  color:#2d6a4f;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

.cta:hover{
  transform:scale(1.05);
}

.section{
  padding:80px 20px;
  text-align:center;
}

.features{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 15px 30px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.login-box{
  max-width:400px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:2px solid #ddd;
}

button.login{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2d6a4f;
  color:white;
  font-size:16px;
  cursor:pointer;
}

#message{
  margin-top:10px;
  font-weight:bold;
  color:#d00000;
}
</style>
</head>
<body>

<!-- HERO SECTION -->
<div class="hero">
  <div class="hero-content">
    <h1>🏆 باشگاه نخبگان ریاضی</h1>
    <p>جایی که مسئله‌ها حل می‌شوند، نه حفظ!</p>
    <button class="cta" onclick="document.getElementById('loginSection').scrollIntoView({behavior:'smooth'})">
      شروع یادگیری
    </button>
  </div>
</div>

<!-- FEATURES -->
<div class="section">
  <h2>چرا باشگاه نخبگان؟</h2>
  <div class="features">
    <div class="card">
      🎮 بازی‌های تعاملی<br><br>
      یادگیری مفاهیم با بازی و انیمیشن
    </div>
    <div class="card">
      📝 تمرین‌های هوشمند<br><br>
      تمرین مرحله‌ای با توضیح حل
    </div>
    <div class="card">
      📊 آزمون و تحلیل عملکرد<br><br>
      بررسی پیشرفت دانش‌آموز
    </div>
  </div>
</div>

<!-- LOGIN SECTION -->
<div class="section" id="loginSection">
  <h2>ورود دانش‌آموز</h2>

  <div class="login-box">
    <input type="text" id="phone" placeholder="شماره تلفن">
    <input type="password" id="password" placeholder="رمز عبور">
    <button class="login" onclick="login()">ورود به حساب</button>
    <div id="message"></div>
  </div>
</div>

<script>

const supabaseUrl = "https://ypjmkigvghybkwyxndcz.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwam1raWd2Z2h5Ymt3eXhuZGN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTc1NTgsImV4cCI6MjA5OTY5MzU1OH0.lJ5RddKmDdPfLecBsqL9XMGejL9Owbv1ZH2PXSqqdv4";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

async function login(){

  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();
  const email = phone + "@school.local";

  document.getElementById("message").innerText = "در حال ورود...";

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: password
  });

  if(error){
    document.getElementById("message").innerText =
      "شماره یا رمز اشتباه است ❌";
    return;
  }

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", data.user.id)
    .single();

  if(profile.grade == 7){
    window.location.href="grade7.html";
  }
  if(profile.grade == 8){
    window.location.href="grade8.html";
  }
  if(profile.grade == 9){
    window.location.href="grade9.html";
  }
}

</script>

</body>
</html>

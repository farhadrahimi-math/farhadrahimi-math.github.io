<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود دانش آموز</title>

  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <style>
    body {
      font-family: Tahoma;
      background: #f2f2f2;
      text-align: center;
      padding-top: 100px;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    input {
      padding: 10px;
      width: 80%;
      margin-bottom: 15px;
    }
    button {
      padding: 10px 20px;
      background: #3498db;
      color: white;
      border: none;
      cursor: pointer;
    }
    #message {
      margin-top: 15px;
      font-weight: bold;
      color: red;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>ورود به سیستم آزمون</h2>
  <input type="text" id="phone" placeholder="شماره تلفن">
  <input type="password" id="password" placeholder="رمز عبور">
  <button id="loginBtn">ورود</button>
  <div id="message"></div>
</div>

<script>
  const supabaseUrl = "https://ypjmkigvghybkwyxndcz.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwam1raWd2Z2h5Ymt3eXhuZGN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTc1NTgsImV4cCI6MjA5OTY5MzU1OH0.lJ5RddKmDdPfLecBsqL9XMGejL9Owbv1ZH2PXSqqdv4";

  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  document.getElementById("loginBtn").addEventListener("click", async function () {

    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value.trim();
    const email = phone + "@school.local";

    document.getElementById("message").innerText = "در حال ورود...";

    // ✅ لاگین امن
    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      document.getElementById("message").innerText = "شماره یا رمز اشتباه است ❌";
      return;
    }

    // ✅ گرفتن پروفایل
    const user = data.user;

const { data: profile, error: profileError } = await supabaseClient
  .from("profiles")
  .select("*")
  .eq("id", user.id)
  .single();

    if (profileError || !profile) {
      document.getElementById("message").innerText = "خطا در دریافت اطلاعات ❌";
      return;
    }

    // ✅ ریدایرکت امن
    if (profile.grade == 7) {
      window.location.href = "grade7.html";
    } else if (profile.grade == 8) {
      window.location.href = "grade8.html";
    } else if (profile.grade == 9) {
      window.location.href = "grade9.html";
    }

  });
</script>

</body>
</html>

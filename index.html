<script>
  const supabaseUrl = "https://ypjmkigvghybkwyxndcz.supabase.co";
  const supabaseKey = "YOUR_ANON_PUBLIC_KEY_HERE"; 
  // 👆 اینجا حتماً دوباره از داخل Supabase → Settings → API → anon public key کپی کن
  // چون کلیدت رو عمومی فرستادی بهتره عوضش کنی بعداً

  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  async function login() {
    const code = document.getElementById("code").value.trim();
    document.getElementById("message").innerText = "در حال بررسی...";

    const { data, error } = await supabase
      .from("Students")
      .select("*")
      .eq("Student_code", code);

    console.log("DATA:", data);
    console.log("ERROR:", error);

    if (error) {
      document.getElementById("message").innerText = "خطا در اتصال به دیتابیس ❌";
      console.log(error);
      return;
    }

    if (!data || data.length === 0) {
      document.getElementById("message").innerText = "کد اشتباه است ❌";
      return;
    }

    const student = data[0];

    if (student.Grade == 7) {
      window.location.href = "grade7.html";
    } else if (student.Grade == 8) {
      window.location.href = "grade8.html";
    } else if (student.Grade == 9) {
      window.location.href = "grade9.html";
    } else {
      document.getElementById("message").innerText = "پایه تعریف نشده است ❌";
    }
  }
</script>

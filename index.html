<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>باشگاه نخبگان ریاضی</title>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
body{
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:95%;
  max-width:420px;
  background:white;
  padding:40px 30px;
  border-radius:20px;
  box-shadow:0 25px 50px rgba(0,0,0,0.3);
  text-align:center;
}

.logo{
  font-size:32px;
  font-weight:bold;
  color:#2d6a4f;
  margin-bottom:10px;
}

.subtitle{
  font-size:14px;
  color:#555;
  margin-bottom:30px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:2px solid #ddd;
  font-size:15px;
}

input:focus{
  border-color:#667eea;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#2d6a4f;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#1b4332;
}

#message{
  margin-top:15px;
  font-size:14px;
  font-weight:bold;
  color:#d00000;
}
</style>
</head>
<body>

<div class="container">

<div class="logo">🏆 باشگاه نخبگان ریاضی</div>
<div class="subtitle">
پلتفرم هوشمند آموزش ریاضی پایه هفتم، هشتم و نهم
</div>

<input type="text" id="phone" placeholder="شماره تلفن">
<input type="password" id="password" placeholder="رمز عبور">

<button onclick="login()">ورود به حساب کاربری</button>

<div id="message"></div>

</div>

<script>

const supabaseUrl = "https://ypjmkigvghybkwyxndcz.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwam1raWd2Z2h5Ymt3eXhuZGN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTc1NTgsImV4cCI6MjA5OTY5MzU1OH0.lJ5RddKmDdPfLecBsqL9XMGejL9Owbv1ZH2PXSqqdv4";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

async function login(){

  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();
  const email = phone + "@school.local";

  document.getElementById("message").innerText = "در حال ورود...";

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: password
  });

  if(error){
    document.getElementById("message").innerText =
      "شماره یا رمز اشتباه است ❌";
    return;
  }

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", data.user.id)
    .single();

  if(profile.grade == 7){
    window.location.href="grade7.html";
  }

  if(profile.grade == 8){
    window.location.href="grade8.html";
  }

  if(profile.grade == 9){
    window.location.href="grade9.html";
  }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فصل ۱ - راهبردهای حل مسئله</title>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
body{
  margin:0;
  font-family:Tahoma;
  background:#f4f6fb;
}

.header{
  background:linear-gradient(135deg,#667eea,#764ba2);
  padding:40px 20px;
  color:white;
  text-align:center;
}

.header h1{
  margin:0;
  font-size:30px;
}

.container{
  max-width:1000px;
  margin:40px auto;
  padding:0 20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 15px 35px rgba(0,0,0,0.12);
}

.card h3{
  margin-top:0;
}

.card p{
  font-size:14px;
  color:#666;
}

.button{
  display:inline-block;
  margin-top:15px;
  padding:10px 18px;
  border-radius:8px;
  background:#667eea;
  color:white;
  text-decoration:none;
  font-size:14px;
  transition:0.3s;
}

.button:hover{
  background:#5a4bd6;
}

.locked{
  background:#ccc !important;
  cursor:not-allowed;
}

.back{
  margin-top:40px;
  text-align:center;
}

.loading{
  text-align:center;
  margin-top:100px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="header">
  <h1>📘 فصل ۱ - راهبردهای حل مسئله</h1>
  <p>یادگیری مفهومی با بازی و تمرین تعاملی</p>
</div>

<div class="container">

<div id="loading" class="loading">
در حال بررسی دسترسی...
</div>

<div id="content" style="display:none;">

  <div class="cards">

    <div class="card">
      <h3>🎮 بازی حرکت توپ</h3>
      <p>درک راهبرد رسم شکل با انیمیشن</p>
      <a href="grade7-ch1-ball.html" class="button">
        شروع بازی
      </a>
    </div>

    <!-- اینجا بعداً بازی جدید رو اضافه می‌کنیم --><a href="grade7-ch1-pattern.html" class="button">
  شروع بازی
    </a>

    <div class="card">
      <h3>📝 تمرین</h3>
      <p>به زودی اضافه می‌شود</p>
      <span class="button locked">
        قفل شده
      </span>
    </div>

    <div class="card">
      <h3>📊 آزمون</h3>
      <p>به زودی اضافه می‌شود</p>
      <span class="button locked">
        قفل شده
      </span>
    </div>

  </div>

  <div class="back">
    <a href="grade7.html" class="button">⬅ بازگشت به پایه ۷</a>
  </div>

</div>

</div>

<script>

const supabaseUrl = "https://ypjmkigvghybkwyxndcz.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwam1raWd2Z2h5Ymt3eXhuZGN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTc1NTgsImV4cCI6MjA5OTY5MzU1OH0.lJ5RddKmDdPfLecBsqL9XMGejL9Owbv1ZH2PXSqqdv4";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

async function checkAccess(){

  const { data: { session } } = await supabaseClient.auth.getSession();

  if(!session){
    window.location.href="index.html";
    return;
  }

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id",session.user.id)
    .single();

  if(!profile || profile.grade!=7){
    window.location.href="index.html";
    return;
  }

  document.getElementById("loading").style.display="none";
  document.getElementById("content").style.display="block";
}

checkAccess();

</script>

</body>
</html>

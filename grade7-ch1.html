<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فصل ۱ - راهبردهای حل مسئله</title>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
body{
  margin:0;
  font-family:Tahoma;
  background:#f4f6fb;
}

.header{
  background:linear-gradient(135deg,#667eea,#764ba2);
  padding:40px 20px;
  color:white;
  text-align:center;
}

.container{
  max-width:900px;
  margin:40px auto;
  padding:0 20px;
}

.section{
  margin-bottom:50px;
}

.section h2{
  border-right:5px solid #2d6a4f;
  padding-right:10px;
  color:#2d6a4f;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.button{
  display:inline-block;
  margin-top:10px;
  padding:8px 16px;
  border-radius:8px;
  background:#667eea;
  color:white;
  text-decoration:none;
  font-size:14px;
}

.loading{
  text-align:center;
  margin-top:100px;
  font-size:18px;
}
</style>
</head>

<body>

<div id="loading" class="loading">
در حال بررسی دسترسی...
</div>

<div id="content" style="display:none;">

<div class="header">
  <h1>📘 فصل ۱</h1>
  <p>راهبردهای حل مسئله</p>
</div>

<div class="container">

<!-- ✅ بازی‌ها -->
<div class="section">
  <h2>🎮 بازی‌های فصل</h2>
  <div class="cards">
    <div class="card">
      بازی حرکت توپ
      <br>
      <a href="grade7-ch1-ball.html" class="button">ورود</a>
    </div>

    <div class="card">
      بازی کشف الگو
      <br>
      <a href="grade7-ch1-pattern.html" class="button">ورود</a>
    </div>
  </div>
</div>

<!-- ✅ آزمون‌ها -->
<div class="section">
  <h2>📊 آزمون‌های فصل</h2>
  <div class="cards">
    <div class="card">
      آزمون مرحله‌ای ۱
      <br>
      <a href="grade7-ch1-exam1.html" class="button">شروع</a>
    </div>

    <div class="card">
      آزمون نهایی فصل
      <br>
      <a href="grade7-ch1-final-exam.html" class="button">شروع</a>
    </div>
  </div>
</div>

</div>
</div>

<script>

const supabaseUrl = "https://ypjmkigvghybkwyxndcz.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwam1raWd2Z2h5Ymt3eXhuZGN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTc1NTgsImV4cCI6MjA5OTY5MzU1OH0.lJ5RddKmDdPfLecBsqL9XMGejL9Owbv1ZH2PXSqqdv4";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

async function checkAccess(){

  const { data:{session} } = await supabaseClient.auth.getSession();

  if(!session){
    window.location.href="index.html";
    return;
  }

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("grade, role")
    .eq("id", session.user.id)
    .single();

  if(!profile){
    window.location.href="index.html";
    return;
  }

  // ✅ اگر ادمین بود
  if(profile.role === "admin"){
    window.location.href="admin.html";
    return;
  }

  // ✅ فقط پایه ۷ اجازه دارد
  if(parseInt(profile.grade) !== 7){
    window.location.href="grade"+profile.grade+".html";
    return;
  }

  document.getElementById("loading").style.display="none";
  document.getElementById("content").style.display="block";
}

checkAccess();

</script>

</body>
</html>

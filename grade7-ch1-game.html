<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 بازی فصل ۱ - پایه هفتم</title>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
body {
  margin: 0;
  font-family: Tahoma;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  width: 90%;
  max-width: 600px;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  text-align: center;
  animation: fadeIn 0.6s ease;
}

h2 {
  margin-bottom: 15px;
  color: #333;
}

#questionBox {
  font-size: 20px;
  margin: 20px 0;
  min-height: 60px;
}

input {
  padding: 12px;
  width: 120px;
  font-size: 16px;
  border-radius: 8px;
  border: 2px solid #ddd;
  outline: none;
  transition: 0.3s;
  text-align: center;
}

input:focus {
  border-color: #667eea;
}

button {
  padding: 12px 25px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: #667eea;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #5a67d8;
  transform: translateY(-2px);
}

#result {
  margin-top: 15px;
  font-weight: bold;
  min-height: 25px;
}

#score {
  margin-top: 15px;
  font-size: 18px;
  color: #444;
}

.progress-bar {
  height: 10px;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 15px;
}

.progress {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #4facfe, #00f2fe);
  transition: width 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="box">
  <h2>🎮 بازی فصل ۱ (راهبردهای حل مسئله)</h2>
  <div id="questionBox">در حال بررسی دسترسی...</div>
  <div id="answerBox"></div>
  <div id="result"></div>
  <div id="score"></div>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>
</div>

<script>
const supabaseUrl = "https://ypjmkigvghybkwyxndcz.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwam1raWd2Z2h5Ymt3eXhuZGN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTc1NTgsImV4cCI6MjA5OTY5MzU1OH0.lJ5RddKmDdPfLecBsqL9XMGejL9Owbv1ZH2PXSqqdv4";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let currentQuestion;
let score = 0;
let questionCount = 0;

// ✅ بررسی امنیت صفحه
async function checkAccess() {
  const { data: { session } } = await supabaseClient.auth.getSession();

  if (!session) {
    window.location.href = "index.html";
    return;
  }

  const user = session.user;

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  if (!profile || profile.grade != 7) {
    window.location.href = "index.html";
    return;
  }

  startGame();
}

// ✅ تولید سوال الگو عددی
function generatePatternQuestion() {
  const start = Math.floor(Math.random() * 10) + 1;
  const step = Math.floor(Math.random() * 5) + 2;

  const sequence = [
    start,
    start + step,
    start + 2 * step
  ];

  const answer = start + 3 * step;

  return {
    question: `عدد بعدی الگو چیست؟ <br><b>${sequence.join(" ، ")} ، ؟</b>`,
    answer: answer
  };
}

// ✅ شروع بازی
function startGame() {
  score = 0;
  questionCount = 0;
  document.getElementById("score").innerHTML = "امتیاز: 0";
  document.getElementById("progress").style.width = "0%";
  nextQuestion();
}

// ✅ سوال بعدی
function nextQuestion() {

  if (questionCount >= 5) {
    document.getElementById("questionBox").innerHTML = "✅ بازی تمام شد!";
    document.getElementById("answerBox").innerHTML = "";
    document.getElementById("result").innerHTML = "";
    document.getElementById("score").innerHTML = "امتیاز نهایی: " + score;
    return;
  }

  currentQuestion = generatePatternQuestion();
  questionCount++;

  document.getElementById("progress").style.width = (questionCount * 20) + "%";

  document.getElementById("questionBox").innerHTML = currentQuestion.question;

  document.getElementById("answerBox").innerHTML = `
    <input type="number" id="userAnswer">
    <br>
    <button onclick="checkAnswer()">ثبت پاسخ</button>
  `;

  document.getElementById("result").innerHTML = "";
}

// ✅ بررسی جواب
function checkAnswer() {
  const userAnswer = parseInt(document.getElementById("userAnswer").value);

  if (userAnswer === currentQuestion.answer) {
    score += 10;
    document.getElementById("result").innerHTML = "✅ درست!";
  } else {
    document.getElementById("result").innerHTML = "❌ غلط! جواب درست: " + currentQuestion.answer;
  }

  document.getElementById("score").innerHTML = "امتیاز: " + score;

  setTimeout(nextQuestion, 1200);
}

checkAccess();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 بازی فصل ۱ - پایه هفتم</title>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
body {
  margin: 0;
  font-family: Tahoma;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  width: 90%;
  max-width: 650px;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  text-align: center;
}

h2 { margin-bottom: 15px; }

#questionBox {
  font-size: 20px;
  margin: 20px 0;
  min-height: 60px;
}

input {
  padding: 10px;
  width: 120px;
  margin: 5px;
  border-radius: 8px;
  border: 2px solid #ddd;
  text-align: center;
}

button {
  padding: 10px 25px;
  border: none;
  border-radius: 10px;
  background: #667eea;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

button:hover { background: #5a67d8; }

.progress-bar {
  height: 10px;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 20px;
}

.progress {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #4facfe, #00f2fe);
  transition: width 0.4s ease;
}

#result { font-weight: bold; margin-top: 10px; }
#score { margin-top: 10px; font-size: 18px; }
</style>
</head>
<body>

<div class="box">
  <h2>🎮 بازی فصل ۱ (راهبردهای حل مسئله)</h2>
  <div id="questionBox">در حال بررسی دسترسی...</div>
  <div id="answerBox"></div>
  <div id="result"></div>
  <div id="score"></div>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>
</div>

<script>
const supabaseUrl = "https://ypjmkigvghybkwyxndcz.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwam1raWd2Z2h5Ymt3eXhuZGN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTc1NTgsImV4cCI6MjA5OTY5MzU1OH0.lJ5RddKmDdPfLecBsqL9XMGejL9Owbv1ZH2PXSqqdv4";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let currentQuestion;
let score = 0;
let questionCount = 0;

// ✅ امنیت
async function checkAccess() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) return window.location.href = "index.html";

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", session.user.id)
    .single();

  if (!profile || profile.grade != 7)
    return window.location.href = "index.html";

  startGame();
}

// ✅ بازی 1: الگو
function generatePattern() {
  const start = Math.floor(Math.random() * 10) + 1;
  const step = Math.floor(Math.random() * 5) + 2;
  const seq = [start, start+step, start+2*step];
  return {
    type: "pattern",
    question: `عدد بعدی الگو چیست؟<br><b>${seq.join(" ، ")} ، ؟</b>`,
    answer: start + 3*step
  };
}

// ✅ بازی 2: مرغ و گاو
function generateAnimals() {
  const chickens = Math.floor(Math.random()*6)+3;
  const cows = Math.floor(Math.random()*4)+2;
  const heads = chickens + cows;
  const legs = chickens*2 + cows*4;

  return {
    type: "animals",
    question: `در مزرعه ${heads} حیوان و ${legs} پا وجود دارد.<br>چند مرغ و چند گاو داریم؟`,
    answer: { chickens, cows }
  };
}

// ✅ بازی 3: سکه
function generateCoins() {
  const c100 = Math.floor(Math.random()*4)+1;
  const c50 = Math.floor(Math.random()*4)+1;
  const total = c100*100 + c50*50;

  return {
    type: "coins",
    question: `با سکه های 100 و 50 تومانی مبلغ ${total} ساخته شده است.<br>چند سکه 100 و چند سکه 50 داریم؟`,
    answer: { c100, c50 }
  };
}

function generateRandomQuestion() {
  const type = Math.floor(Math.random()*3);
  if (type===0) return generatePattern();
  if (type===1) return generateAnimals();
  return generateCoins();
}

// ✅ شروع
function startGame(){
  score=0;
  questionCount=0;
  document.getElementById("score").innerHTML="امتیاز: 0";
  nextQuestion();
}

function nextQuestion(){

  if(questionCount>=5){
    document.getElementById("questionBox").innerHTML="✅ بازی تمام شد!";
    document.getElementById("answerBox").innerHTML="";
    document.getElementById("score").innerHTML="امتیاز نهایی: "+score;
    return;
  }

  questionCount++;
  document.getElementById("progress").style.width=(questionCount*20)+"%";

  currentQuestion=generateRandomQuestion();
  document.getElementById("questionBox").innerHTML=currentQuestion.question;

  if(currentQuestion.type==="pattern"){
    document.getElementById("answerBox").innerHTML=
      `<input type="number" id="a1">
       <br><button onclick="checkAnswer()">ثبت پاسخ</button>`;
  }

  if(currentQuestion.type==="animals"){
    document.getElementById("answerBox").innerHTML=
      `مرغ: <input type="number" id="a1">
       گاو: <input type="number" id="a2">
       <br><button onclick="checkAnswer()">ثبت پاسخ</button>`;
  }

  if(currentQuestion.type==="coins"){
    document.getElementById("answerBox").innerHTML=
      `سکه 100: <input type="number" id="a1">
       سکه 50: <input type="number" id="a2">
       <br><button onclick="checkAnswer()">ثبت پاسخ</button>`;
  }

  document.getElementById("result").innerHTML="";
}

function checkAnswer(){

  let correct=false;

  if(currentQuestion.type==="pattern"){
    const user=parseInt(document.getElementById("a1").value);
    correct=(user===currentQuestion.answer);
  }

  if(currentQuestion.type==="animals"){
    const c=parseInt(document.getElementById("a1").value);
    const w=parseInt(document.getElementById("a2").value);
    correct=(c===currentQuestion.answer.chickens &&
             w===currentQuestion.answer.cows);
  }

  if(currentQuestion.type==="coins"){
    const c1=parseInt(document.getElementById("a1").value);
    const c2=parseInt(document.getElementById("a2").value);
    correct=(c1===currentQuestion.answer.c100 &&
             c2===currentQuestion.answer.c50);
  }

  if(correct){
    score+=10;
    document.getElementById("result").innerHTML="✅ درست!";
  }else{
    document.getElementById("result").innerHTML="❌ غلط!";
  }

  document.getElementById("score").innerHTML="امتیاز: "+score;
  setTimeout(nextQuestion,1200);
}

checkAccess();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پنل مدیریت</title>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
body{
  margin:0;
  font-family:Tahoma;
  background:#f4f6fb;
  padding:30px;
}

.container{
  max-width:1200px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 15px 30px rgba(0,0,0,0.1);
}

h2{margin-top:0;}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:30px;
}

.stat-card{
  background:linear-gradient(135deg,#74c69d,#2d6a4f);
  color:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

input, select{
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:8px 16px;
  border:none;
  border-radius:8px;
  background:#2d6a4f;
  color:white;
  cursor:pointer;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th, td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:center;
}

.edit-btn{ background:#667eea; }
.toggle-btn{ background:#e76f51; }
</style>
</head>
<body>

<div class="container">

<h2>👑 داشبورد مدیریت</h2>

<!-- ✅ بخش آمار -->
<div class="stats">
  <div class="stat-card" id="totalStudents">کل دانش‌آموزان: 0</div>
  <div class="stat-card" id="grade7Count">پایه ۷: 0</div>
  <div class="stat-card" id="grade8Count">پایه ۸: 0</div>
  <div class="stat-card" id="grade9Count">پایه ۹: 0</div>
  <div class="stat-card" id="activeCount">فعال: 0</div>
  <div class="stat-card" id="inactiveCount">غیرفعال: 0</div>
</div>

<h3>➕ افزودن دانش‌آموز</h3>

<input type="text" id="name" placeholder="نام دانش‌آموز">
<input type="text" id="phone" placeholder="شماره تلفن">
<input type="password" id="password" placeholder="رمز عبور">

<select id="grade">
  <option value="7">پایه ۷</option>
  <option value="8">پایه ۸</option>
  <option value="9">پایه ۹</option>
</select>

<button onclick="addStudent()">ثبت</button>

<h3>📋 لیست دانش‌آموزان</h3>

<table>
<thead>
<tr>
<th>نام</th>
<th>پایه</th>
<th>وضعیت</th>
<th>ویرایش</th>
<th>فعال/غیرفعال</th>
</tr>
</thead>
<tbody id="studentsTable"></tbody>
</table>

</div>

<script>

const supabaseUrl = "https://ypjmkigvghybkwyxndcz.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwam1raWd2Z2h5Ymt3eXhuZGN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTc1NTgsImV4cCI6MjA5OTY5MzU1OH0.lJ5RddKmDdPfLecBsqL9XMGejL9Owbv1ZH2PXSqqdv4";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let studentsData = [];

async function checkAdmin(){

  const { data:{session} } = await supabaseClient.auth.getSession();

  if(!session){
    window.location.href="index.html";
    return;
  }

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", session.user.id)
    .single();

  if(!profile || profile.role !== "admin"){
    alert("دسترسی غیرمجاز");
    window.location.href="index.html";
  }
}

async function loadStudents(){

  const { data } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("role","student");

  studentsData = data;
  renderTable(data);
  updateStats(data);
}

function updateStats(data){

  document.getElementById("totalStudents").innerText =
    "کل دانش‌آموزان: " + data.length;

  document.getElementById("grade7Count").innerText =
    "پایه ۷: " + data.filter(s=>s.grade==7).length;

  document.getElementById("grade8Count").innerText =
    "پایه ۸: " + data.filter(s=>s.grade==8).length;

  document.getElementById("grade9Count").innerText =
    "پایه ۹: " + data.filter(s=>s.grade==9).length;

  document.getElementById("activeCount").innerText =
    "فعال: " + data.filter(s=>s.is_active).length;

  document.getElementById("inactiveCount").innerText =
    "غیرفعال: " + data.filter(s=>!s.is_active).length;
}

function renderTable(data){

  const table = document.getElementById("studentsTable");
  table.innerHTML="";

  data.forEach(student=>{

    const row = `
      <tr>
        <td>${student.name || "-"}</td>
        <td>${student.grade}</td>
        <td>${student.is_active ? "✅ فعال" : "❌ غیرفعال"}</td>
        <td>
          <button class="edit-btn" onclick="editStudent('${student.id}')">
            ویرایش
          </button>
        </td>
        <td>
          <button class="toggle-btn" onclick="toggleStudent('${student.id}', ${student.is_active})">
            ${student.is_active ? "غیرفعال کردن" : "فعال کردن"}
          </button>
        </td>
      </tr>
    `;

    table.innerHTML += row;
  });
}

async function addStudent(){

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();
  const grade = document.getElementById("grade").value;

  const email = phone + "@school.local";

  const { data, error } = await supabaseClient.auth.signUp({
    email: email,
    password: password
  });

  if(error){
    alert("خطا در ساخت کاربر");
    return;
  }

  await supabaseClient.from("profiles").insert([
    {
      id: data.user.id,
      name: name,
      grade: parseInt(grade),
      is_active: true,
      role: "student"
    }
  ]);

  loadStudents();
}

async function toggleStudent(id, currentStatus){

  await supabaseClient
    .from("profiles")
    .update({ is_active: !currentStatus })
    .eq("id", id);

  loadStudents();
}

function editStudent(id){

  const student = studentsData.find(s => s.id === id);

  const newName = prompt("نام جدید:", student.name);
  const newGrade = prompt("پایه جدید (7 یا 8 یا 9):", student.grade);

  if(newName && newGrade){

    supabaseClient
      .from("profiles")
      .update({
        name: newName,
        grade: parseInt(newGrade)
      })
      .eq("id", id)
      .then(()=>{
        loadStudents();
      });
  }
}

checkAdmin();
loadStudents();

</script>

</body>
</html>
